services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cracklav_app
    ports:
      - '8000:80'
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cracklav
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      APP_URL: ${APP_URL}
    depends_on:
      - db

  db:
    image: mysql:8.1
    container_name: cracklav_db
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cracklav
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cracklav_phpmyadmin
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  dbdata:
